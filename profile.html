<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crema — Profile</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 16px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .profile-stat { text-align: center; }
    .profile-stat-num  { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .profile-stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    #viewMode, #editMode { display: flex; flex-direction: column; gap: 16px; }
    #editMode { display: none; }

    .edit-actions { display: flex; gap: 10px; }
    .edit-actions .btn { flex: 1; }
  </style>
</head>
<body>

  <nav class="topnav">
    <span class="topnav-logo">Profile</span>
    <span></span>
  </nav>

  <main class="page">

    <div class="profile-header" id="profileHeader">
      <img class="profile-avatar" id="profileAvatar" src="" alt=""
        onerror="this.style.background='var(--border)';this.removeAttribute('src')" />
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-bio"  id="profileBio"></div>
      <div style="font-size:0.82rem; color:var(--muted)" id="profileEmail"></div>
    </div>

    <div class="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-num"  id="statBrews">—</div>
        <div class="profile-stat-label">Brews</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num"  id="statFollowers">—</div>
        <div class="profile-stat-label">Followers</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num"  id="statFollowing">—</div>
        <div class="profile-stat-label">Following</div>
      </div>
    </div>

    <!-- View mode -->
    <div id="viewMode">
      <button class="btn btn-ghost" onclick="startEdit()">Edit profile</button>
      <button class="btn btn-ghost" id="signOutBtn">Sign out</button>
    </div>

    <!-- Edit mode -->
    <div id="editMode">
      <div class="form-group">
        <label>Display name</label>
        <input class="input" id="editName"     type="text"  placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Username</label>
        <input class="input" id="editUsername" type="text"  placeholder="@username" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Bio</label>
        <input class="input" id="editBio"      type="text"  placeholder="Home barista, obsessed with tulips…" />
      </div>
      <div class="error-msg" id="editError"></div>
      <div class="edit-actions">
        <button class="btn btn-ghost"    onclick="cancelEdit()">Cancel</button>
        <button class="btn btn-primary"  id="saveBtn" onclick="saveProfile()">Save</button>
      </div>
    </div>

  </main>

  <nav class="bottomnav">
    <a href="/dashboard.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z"/><path d="M9 21v-8h6v8"/></svg>
      Home
    </a>
    <a href="/feed.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>
      Feed
    </a>
    <a href="/log.html" class="log-btn">
      <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
    </a>
    <a href="/library.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Library
    </a>
    <a href="/profile.html" class="active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      Profile
    </a>
  </nav>

  <script type="module">
    import { supabase, requireAuth, signOut } from '/js/auth.js';

    const session = await requireAuth();
    const user    = session.user;
    let profile   = {};

    document.getElementById('profileEmail').textContent = user.email || '';
    document.getElementById('signOutBtn').addEventListener('click', signOut);

    async function loadProfile() {
      const [profileRes, brewsRes, followersRes, followingRes] = await Promise.all([
        supabase.from('profiles').select('*').eq('id', user.id).single(),
        supabase.from('coffee_logs').select('id', { count: 'exact', head: true }).eq('user_id', user.id),
        supabase.from('follows').select('follower_id', { count: 'exact', head: true }).eq('following_id', user.id),
        supabase.from('follows').select('following_id', { count: 'exact', head: true }).eq('follower_id', user.id),
      ]);

      profile = profileRes.data || {};

      const displayName = profile.full_name || profile.username || user.email;
      document.getElementById('profileName').textContent   = displayName;
      document.getElementById('profileBio').textContent    = profile.bio || '';
      document.getElementById('statBrews').textContent     = brewsRes.count     ?? 0;
      document.getElementById('statFollowers').textContent = followersRes.count ?? 0;
      document.getElementById('statFollowing').textContent = followingRes.count ?? 0;
      if (profile.avatar_url) document.getElementById('profileAvatar').src = profile.avatar_url;
    }

    window.startEdit = function() {
      document.getElementById('editName').value     = profile.full_name || '';
      document.getElementById('editUsername').value = profile.username  || '';
      document.getElementById('editBio').value      = profile.bio       || '';
      document.getElementById('viewMode').style.display = 'none';
      document.getElementById('editMode').style.display = 'flex';
      document.getElementById('editError').style.display = 'none';
    };

    window.cancelEdit = function() {
      document.getElementById('editMode').style.display = 'none';
      document.getElementById('viewMode').style.display = 'flex';
    };

    window.saveProfile = async function() {
      const btn      = document.getElementById('saveBtn');
      const fullName = document.getElementById('editName').value.trim();
      const username = document.getElementById('editUsername').value.trim().replace(/^@/, '');
      const bio      = document.getElementById('editBio').value.trim();

      btn.disabled = true;
      btn.textContent = 'Saving…';
      document.getElementById('editError').style.display = 'none';

      const { error } = await supabase
        .from('profiles')
        .upsert({ id: user.id, full_name: fullName || null, username: username || null, bio: bio || null });

      if (error) {
        const msg = error.message.includes('unique') ? 'That username is already taken.' : error.message;
        const errEl = document.getElementById('editError');
        errEl.textContent = msg;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Save';
        return;
      }

      await loadProfile();
      cancelEdit();
      btn.disabled = false;
      btn.textContent = 'Save';
    };

    await loadProfile();
  </script>
</body>
</html>
