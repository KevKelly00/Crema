<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crema — Feed</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .feed-tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 52px;
      z-index: 9;
    }
    .feed-tab {
      flex: 1;
      padding: 11px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: all 0.15s;
      letter-spacing: -0.1px;
    }
    .feed-tab.active { color: var(--text); border-bottom-color: var(--text); }
    .brew-card { background: var(--card); border-bottom: 1px solid var(--border); }
    .brew-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; }
    .brew-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface);
      border: 1px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
    }
    .brew-username { font-weight: 600; font-size: 0.875rem; cursor: pointer; }
    .brew-username:hover { opacity: 0.7; }
    .brew-date { font-size: 0.75rem; color: var(--muted); }
    .follow-btn {
      margin-left: auto;
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
      width: auto;
    }
    .follow-btn.following { background: var(--surface); }
    .follow-btn:hover { background: var(--surface); }
    .brew-photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; cursor: pointer; }
    .brew-photo-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      color: var(--border);
      cursor: pointer;
    }
    .brew-card-footer { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 6px; }
    .brew-style-badge {
      display: inline-flex;
      align-items: center;
      background: var(--surface);
      color: var(--text-2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .brew-ratings { display: flex; gap: 12px; font-size: 0.8rem; color: var(--muted); }
    .brew-notes {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #feedList { padding-bottom: calc(var(--nav-h) + 16px); }
  </style>
</head>
<body>

  <nav class="topnav">
    <span class="topnav-logo">crema</span>
    <span></span>
  </nav>

  <div class="feed-tabs">
    <div class="feed-tab active" id="tabAll"       onclick="switchTab('all')">All brews</div>
    <div class="feed-tab"        id="tabFollowing" onclick="switchTab('following')">Following</div>
  </div>

  <div id="feedList">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

  <nav class="bottomnav">
    <a href="/dashboard.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z"/><path d="M9 21v-8h6v8"/></svg>
      Home
    </a>
    <a href="/feed.html" class="active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>
      Feed
    </a>
    <a href="/log.html" class="log-btn">
      <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
    </a>
    <a href="/library.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Library
    </a>
    <a href="/profile.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      Profile
    </a>
  </nav>

  <script type="module">
    import { supabase, requireAuth } from '/js/auth.js';

    const session  = await requireAuth();
    const userId   = session.user.id;
    let   tab      = 'all';
    let   follows  = new Set(); // IDs the current user follows


    // Load who the current user follows
    async function loadFollows() {
      const { data } = await supabase
        .from('follows')
        .select('following_id')
        .eq('follower_id', userId);
      follows = new Set((data || []).map(r => r.following_id));
    }

    async function loadFeed() {
      const list = document.getElementById('feedList');
      list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

      if (tab === 'following') {
        const ids = [...follows];
        if (ids.length === 0) {
          list.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><p>You're not following anyone yet.<br>Switch to All Brews to discover people.</p></div>`;
          return;
        }
      }

      let query = supabase
        .from('coffee_logs')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(30);

      if (tab === 'following') query = query.in('user_id', [...follows]);

      const { data: logs, error } = await query;

      // Fetch profiles for all unique user IDs
      const profileMap = {};
      if (logs && logs.length > 0) {
        const userIds = [...new Set(logs.map(l => l.user_id))];
        const { data: profiles } = await supabase
          .from('profiles')
          .select('id, username, full_name, avatar_url')
          .in('id', userIds);
        (profiles || []).forEach(p => { profileMap[p.id] = p; });
      }
      list.innerHTML = '';

      if (error || !logs || logs.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">☕</div><p>No brews here yet.</p></div>`;
        return;
      }

      logs.forEach(log => renderCard(log, list, profileMap));
    }

    function renderCard(log, container, profileMap = {}) {
      const profile  = profileMap[log.user_id] || {};
      const username = profile.username || profile.full_name || 'Barista';
      const isOwn    = log.user_id === userId;
      const date     = new Date(log.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' });

      const card = document.createElement('div');
      card.className = 'brew-card';

      const followingThis = follows.has(log.user_id);

      card.innerHTML = `
        <div class="brew-card-header">
          <img class="brew-avatar" src="${esc(profile.avatar_url || '')}" alt=""
            onerror="this.style.background='var(--border)';this.src=''"
            data-uid="${esc(log.user_id)}" />
          <div>
            <div class="brew-username" data-uid="${esc(log.user_id)}">${esc(username)}</div>
            <div class="brew-date">${date}</div>
          </div>
          ${!isOwn ? `
            <button class="follow-btn ${followingThis ? 'following' : ''}"
              data-uid="${esc(log.user_id)}"
              data-username="${esc(username)}">
              ${followingThis ? 'Following' : 'Follow'}
            </button>` : ''}
        </div>
        ${log.photo_url
          ? `<img class="brew-photo" src="${esc(log.photo_url)}" alt="" loading="lazy" data-id="${esc(log.id)}" />`
          : `<div class="brew-photo-placeholder" data-id="${esc(log.id)}"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></div>`}
        <div class="brew-card-footer">
          ${log.art_style ? `<div><span class="brew-style-badge">${esc(log.art_style)}</span></div>` : ''}
          ${(log.art_rating || log.flavour_rating) ? `
            <div class="brew-ratings">
              ${log.art_rating     ? `<span>🎨 ${log.art_rating}/5</span>` : ''}
              ${log.flavour_rating ? `<span>☕ ${log.flavour_rating}/5</span>` : ''}
            </div>` : ''}
          ${log.notes ? `<div class="brew-notes">${esc(log.notes)}</div>` : ''}
        </div>`;

      container.appendChild(card);

      // Photo → detail
      card.querySelectorAll('[data-id]').forEach(el => {
        el.addEventListener('click', () => window.location.href = `/log-detail.html?id=${el.dataset.id}`);
      });

      // Follow button
      const followBtn = card.querySelector('.follow-btn');
      if (followBtn) {
        followBtn.addEventListener('click', () => toggleFollow(followBtn, log.user_id));
      }

      // Username / avatar → public profile (future)
      card.querySelectorAll('[data-uid]').forEach(el => {
        if (!el.classList.contains('follow-btn')) {
          el.style.cursor = 'pointer';
        }
      });
    }

    async function toggleFollow(btn, targetId) {
      btn.disabled = true;
      const isFollowing = follows.has(targetId);

      if (isFollowing) {
        await supabase.from('follows').delete()
          .eq('follower_id', userId).eq('following_id', targetId);
        follows.delete(targetId);
        btn.textContent = 'Follow';
        btn.classList.remove('following');
      } else {
        await supabase.from('follows').insert({ follower_id: userId, following_id: targetId });
        follows.add(targetId);
        btn.textContent = 'Following';
        btn.classList.add('following');
      }
      btn.disabled = false;
    }

    window.switchTab = function(t) {
      tab = t;
      document.getElementById('tabAll').classList.toggle('active', t === 'all');
      document.getElementById('tabFollowing').classList.toggle('active', t === 'following');
      loadFeed();
    };

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    await loadFollows();
    await loadFeed();
  </script>
</body>
</html>
