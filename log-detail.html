<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crema — Brew</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .detail-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--surface);
      display: block;
    }
    .detail-photo-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .detail-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .art-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(196,125,42,0.15);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .detail-date { color: var(--muted); font-size: 0.85rem; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .detail-field { display: flex; flex-direction: column; gap: 4px; }
    .detail-field-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-field-value { font-size: 0.95rem; }
    .stars-display { display: flex; gap: 2px; font-size: 1.1rem; }
    .detail-notes {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text);
    }
    .owner-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }
    .owner-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--border);
      object-fit: cover;
    }
    .owner-name { font-size: 0.9rem; font-weight: 600; flex: 1; }
  </style>
</head>
<body>

  <nav class="topnav">
    <a id="backBtn" href="/library.html" style="color:var(--accent); font-size:1.5rem; line-height:1; padding:0 4px;">‹</a>
    <span style="font-weight:600;">Brew</span>
    <span style="width:28px"></span>
  </nav>

  <div id="content">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

  <nav class="bottomnav">
    <a href="/dashboard.html"><span class="nav-icon">🏠</span>Home</a>
    <a href="/feed.html"><span class="nav-icon">🌍</span>Feed</a>
    <a href="/log.html" class="log-btn"><span>+</span></a>
    <a href="/library.html" class="active"><span class="nav-icon">📚</span>Library</a>
    <a href="/profile.html"><span class="nav-icon">👤</span>Profile</a>
  </nav>

  <script type="module">
    import { loadDetail } from '/js/log-detail.js';
    loadDetail();
  </script>
</body>
</html>
